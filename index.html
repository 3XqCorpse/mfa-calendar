<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MFA FILMMAKING</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23dc2626' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='2' y='7' width='20' height='15' rx='2' ry='2'%3E%3C/rect%3E%3Cpath d='M2 11l20-4'%3E%3C/path%3E%3Cpath d='M7 5l3 8'%3E%3C/path%3E%3Cpath d='M14 3l3 8'%3E%3C/path%3E%3C/svg%3E">
    '<script src="https://cdn.tailwindcss.com"></script>'
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
        body {
            background-color: #080808;
            color: #e5e7eb;
            font-family: 'Inter', Calibri, sans-serif;
            text-align: left;
        }

        /* Scrollbar Professionale */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }


        /* Styles migrated to Tailwind inline classes to resolve IDE warnings */


        /* Stati delle Lezioni / Produzione */
        .status-ready {
            border-left: 8px solid #22c55e !important;
        }

        .status-shooting {
            border-left: 8px solid #eab308 !important;
        }

        .status-wrapped {
            border-left: 8px solid #ef4444 !important;
            opacity: 0.6;
        }

        /* Animazioni */
        @keyframes pulse-red {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .animate-pulse-red {
            animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .lucide {
            width: 14px;
            height: 14px;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const toLocalISO = (date) => {
            const d = new Date(date);
            return d.toLocaleDateString('en-CA');
        };

        const App = () => {
            const btnPrimary = "bg-red-600 hover:bg-red-700 text-white font-black py-4 px-8 transition-all uppercase tracking-widest text-xs shadow-lg active:scale-95 disabled:opacity-50";
            const btnOutline = "border border-white/20 hover:bg-white/10 text-white font-black py-2 px-4 transition-all uppercase tracking-widest text-[9px] active:scale-95";
            const inputPro = "w-full !bg-white border-2 border-neutral-800 p-4 !text-black placeholder:text-neutral-400 focus:border-red-600 outline-none font-bold text-lg transition-all";
            const labelPro = "text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 block";

            const [view, setView] = useState('calendar');
            const [lessons, setLessons] = useState(() => {
                const saved = localStorage.getItem('mfa_master_v4');
                return saved ? JSON.parse(saved) : [];
            });
            const [selectedWeek, setSelectedWeek] = useState(new Date());

            const [formData, setFormData] = useState({
                title: '',
                director: '',
                room: '',
                date: toLocalISO(new Date()),
                startTime: '09:00',
                endTime: '18:00',
                status: 'ready',
                notes: ''
            });

            const [editingId, setEditingId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [weeklyNotes, setWeeklyNotes] = useState(() => {
                const saved = localStorage.getItem('mfa_master_weekly_notes');
                return saved ? JSON.parse(saved) : {};
            });
            const [cloudConfig, setCloudConfig] = useState(() => {
                const saved = localStorage.getItem('mfa_cloud_config');
                return saved ? JSON.parse(saved) : { binId: '', apiKey: '', active: false };
            });
            const [cloudStatus, setCloudStatus] = useState('idle');
            const [cloudErrorDetail, setCloudErrorDetail] = useState('');
            const [showCloudModal, setShowCloudModal] = useState(false);
            const [isInitialLoad, setIsInitialLoad] = useState(true);

            useEffect(() => {
                localStorage.setItem('mfa_cloud_config', JSON.stringify(cloudConfig));
            }, [cloudConfig]);

            useEffect(() => {
                // Inizializza icone Lucide dopo ogni render
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            useEffect(() => {
                localStorage.setItem('mfa_master_v4', JSON.stringify(lessons));
            }, [lessons]);

            useEffect(() => {
                localStorage.setItem('mfa_master_weekly_notes', JSON.stringify(weeklyNotes));
            }, [weeklyNotes]);

            const currentWeekKey = useMemo(() => {
                const d = new Date(selectedWeek);
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(d.setDate(diff));
                return toLocalISO(monday);
            }, [selectedWeek]);

            const days = ['Lunedì', 'Martedì', 'Mercoledì'];

            const formatShortDate = (dateString) => {
                if (!dateString) return "";
                const d = new Date(dateString);
                return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: '2-digit' });
            };

            const getMasterDays = (baseDate) => {
                const d = new Date(baseDate);
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(d.setDate(diff));
                return [0, 1, 2].map(offset => {
                    const next = new Date(monday);
                    next.setDate(monday.getDate() + offset);
                    return toLocalISO(next);
                });
            };

            const currentMasterDays = useMemo(() => getMasterDays(selectedWeek), [selectedWeek]);

            const addLesson = (e) => {
                e.preventDefault();
                if (formData.startTime >= formData.endTime) {
                    alert("ERRORE: L'orario di fine lezione non può precedere l'inizio.");
                    return;
                }

                if (editingId) {
                    setLessons(prev => prev.map(l => l.id === editingId ? { ...formData, id: editingId } : l));
                    setEditingId(null);
                } else {
                    const newLesson = { ...formData, id: Date.now() };
                    setLessons(prev => [...prev, newLesson]);
                }

                resetForm();
            };

            const resetForm = () => {
                setEditingId(null);
                setFormData({
                    title: '',
                    director: '',
                    room: '',
                    date: toLocalISO(new Date()),
                    startTime: '09:00',
                    endTime: '18:00',
                    status: 'ready',
                    notes: ''
                });
            };

            const startEdit = (lesson) => {
                setFormData(lesson);
                setEditingId(lesson.id);
                setView('admin');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const updateStatus = (id, newStatus) => {
                setLessons(prev => prev.map(l => l.id === id ? { ...l, status: newStatus } : l));
            };

            const deleteLesson = (id) => {
                setLessons(prev => prev.filter(l => l.id !== id));
            };

            const getLessonsForDay = (dateStr) => {
                return [...lessons]
                    .filter(l => l.date === dateStr)
                    .sort((a, b) => a.startTime.localeCompare(b.startTime));
            };

            const checkConflict = (lesson) => {
                return lessons.some(l =>
                    l.id !== lesson.id &&
                    l.date === lesson.date &&
                    l.room.toLowerCase() === lesson.room.toLowerCase() &&
                    ((lesson.startTime < l.endTime) && (l.startTime < lesson.endTime))
                );
            };

            const exportDatabase = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({
                    lessons,
                    weeklyNotes
                }));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", `mfa_backup_${toLocalISO(new Date())}.json`);
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const importDatabase = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.lessons) setLessons(data.lessons);
                        if (data.weeklyNotes) setWeeklyNotes(data.weeklyNotes);
                        alert("Database importato con successo!");
                    } catch (err) {
                        alert("Errore nel caricamento del file JSON.");
                    }
                };
                reader.readAsText(file);
            };

            const onDragStart = (e, lessonId) => {
                e.dataTransfer.setData('lessonId', lessonId);
            };

            const onDragOver = (e) => {
                e.preventDefault();
            };

            const onDrop = (e, newDate) => {
                e.preventDefault();
                const lessonId = parseInt(e.dataTransfer.getData('lessonId'));
                setLessons(prev => prev.map(l => l.id === lessonId ? { ...l, date: newDate } : l));
            };

            const saveToCloud = async (data) => {
                const binId = cloudConfig.binId.trim();
                const apiKey = cloudConfig.apiKey.trim();
                if (!cloudConfig.active || !binId || !apiKey) return;
                setCloudStatus('syncing');
                setCloudErrorDetail('');
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
                        body: JSON.stringify(data)
                    });
                    if (response.ok) {
                        setCloudStatus('success');
                        setCloudErrorDetail('');
                    } else {
                        const errData = await response.json().catch(() => ({}));
                        setCloudStatus('error');
                        setCloudErrorDetail(errData.message || `Errore HTTP ${response.status}`);
                    }
                } catch (err) {
                    setCloudStatus('error');
                    setCloudErrorDetail(err.message || 'Connessione Fallita');
                }
            };

            const fetchFromCloud = async () => {
                const binId = cloudConfig.binId.trim();
                const apiKey = cloudConfig.apiKey.trim();
                if (!binId || !apiKey) return;
                setCloudStatus('syncing');
                setCloudErrorDetail('');
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                        headers: { 'X-Master-Key': apiKey, 'X-Bin-Meta': 'false' }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        const lessonsData = data.record ? data.record.lessons : data.lessons;
                        const notesData = data.record ? data.record.weeklyNotes : data.weeklyNotes;
                        if (lessonsData) setLessons(lessonsData);
                        if (notesData) setWeeklyNotes(notesData);
                        setCloudStatus('success');
                        setCloudErrorDetail('');
                        return data;
                    } else {
                        const errData = await response.json().catch(() => ({}));
                        setCloudStatus('error');
                        setCloudErrorDetail(errData.message || `Errore HTTP ${response.status}`);
                    }
                } catch (err) {
                    setCloudStatus('error');
                    setCloudErrorDetail(err.message || 'Errore di sincronizzazione');
                }
            };

            useEffect(() => {
                const hash = window.location.hash;
                if (hash.startsWith('#cloud=')) {
                    try {
                        const config = JSON.parse(atob(hash.replace('#cloud=', '')));
                        if (config.binId && config.apiKey) {
                            setCloudConfig({ ...config, active: true });
                            window.location.hash = '';
                            alert('☁️ Configurazione Cloud Importata con Successo!');
                        }
                    } catch (e) { }
                }
                if (cloudConfig.active && isInitialLoad) {
                    fetchFromCloud().then(() => setIsInitialLoad(false));
                }
            }, []);

            const generateMagicLink = () => {
                const configStr = btoa(JSON.stringify({ binId: cloudConfig.binId, apiKey: cloudConfig.apiKey }));
                return window.location.href.split('#')[0] + '#cloud=' + configStr;
            };

            const copyMagicLink = () => {
                navigator.clipboard.writeText(generateMagicLink());
                alert('🔗 Link copiato! Invialo al tablet/cellulare.');
            };

            useEffect(() => {
                if (isInitialLoad) return;
                const timer = setTimeout(() => saveToCloud({ lessons, weeklyNotes }), 2000);
                return () => clearTimeout(timer);
            }, [lessons, weeklyNotes]);

            const exportCallSheet = () => {
                const weekRange = `${formatShortDate(currentMasterDays[0])} - ${formatShortDate(currentMasterDays[2])}`;

                const statusLabels = {
                    'ready': 'PROGRAMMATA',
                    'shooting': 'IN CORSO',
                    'wrapped': 'CONCLUSA'
                };

                const gridHtml = days.map((dayName, idx) => {
                    const dateStr = currentMasterDays[idx];
                    const dayLessons = getLessonsForDay(dateStr);
                    const items = dayLessons.map(l => `
                        <div style="border: 2px solid #000; border-left: 10px solid #000; padding: 10px 12px; margin-bottom: 6px; background: #fff; position: relative; break-inside: avoid; border-radius: 2px;">
                            <div style="font-weight: 900; font-size: 12px; color: #ff0000; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 2px solid #eee; padding-bottom: 4px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;">
                                <span>[ ${l.startTime} — ${l.endTime} ]</span>
                                <span style="color: #666; font-size: 9px; background: #f5f5f5; padding: 2px 5px;">${statusLabels[l.status] || l.status.toUpperCase()}</span>
                            </div>
                            <div style="font-size: 16px; font-weight: 900; margin: 4px 0; text-transform: uppercase; color: #000; line-height: 1.1; letter-spacing: -0.5px;">${l.title}</div>
                            <div style="font-size: 11px; margin: 6px 0; color: #333; display: flex; gap: 8px; flex-wrap: wrap; text-transform: uppercase; font-weight: 900;">
                                <span style="background: #000; color: #fff; padding: 2px 6px;">D: ${l.director}</span>
                                <span style="background: #eee; padding: 2px 6px; border: 1px solid #ddd;">A: ${l.room}</span>
                            </div>
                            ${l.notes ? `
                            <div style="font-size: 10px; color: #000; background: #fffde7; padding: 6px; border: 1px solid #fbc02d; font-family: 'Helvetica', sans-serif; margin-top: 6px; line-height: 1.2;">
                                <b style="color: #f57f17; font-size: 8px; display: block; border-bottom: 1px solid rgba(245, 127, 23, 0.2); margin-bottom: 3px; padding-bottom: 2px;">TECH NOTES:</b>
                                ${l.notes}
                            </div>` : ''}
                        </div>
                    `).join('') || '<div style="border: 1px dashed #ccc; padding: 20px; text-align:center; color: #bbb; font-size: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 2px;">NESSUNA SESSIONE</div>';

                    return `
                        <div style="flex: 1; padding: 0 6px; border-right: 2px solid #000;">
                            <div style="background: #000; color: #fff; padding: 6px; text-align: center; margin-bottom: 8px;">
                                <h2 style="margin:0; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;">${dayName}</h2>
                            </div>
                            <p style="margin: 0 0 8px 0; color: #000; font-weight: 900; font-size: 22px; text-align: center; letter-spacing: -1px;">${formatShortDate(dateStr)}</p>
                            ${items}
                        </div>
                    `;
                }).join('');

                const win = window.open('', '_blank');
                win.document.write(`
                    <html>
                    <head>
                        <title>MFA FILMMAKING - ${weekRange}</title>
                        <style>
                            @page { size: A4 landscape; margin: 5mm; }
                            body { 
                                font-family: 'Helvetica', 'Arial', sans-serif; 
                                padding: 0; 
                                background-color: #fff; 
                                color: #000; 
                                margin: 0;
                                -webkit-print-color-adjust: exact;
                            }
                            .header { 
                                display: flex; 
                                justify-content: space-between; 
                                border-bottom: 3px solid #000; 
                                padding-bottom: 5px; 
                                margin-bottom: 8px; 
                                align-items: center;
                            }
                            .grid { display: flex; width: 100%; gap: 0; align-items: stretch; }
                            @media print { 
                                .no-print { display: none; }
                            }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            <div>
                                <h1 style="margin:0; font-size: 28px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; line-height: 1;">MFA <span style="color: #ff0000;">FILMMAKING</span></h1>
                                <p style="margin:2px 0 0 0; font-weight: 900; color: #000; font-size: 9px; text-transform: uppercase; letter-spacing: 4px;">WEEKLY ACADEMIC PRODUCTION SCHEDULE</p>
                            </div>
                            <div style="text-align: right; border-left: 3px solid #000; padding-left: 15px;">
                                <p style="margin:0; font-weight: 900; font-size: 16px; line-height: 1; text-transform: uppercase;">SETTIMANA: ${weekRange}</p>
                                <p style="margin:2px 0 0 0; font-size: 8px; font-weight: bold; color: #aaa;">ID_REF: ${Math.random().toString(36).substr(2, 6).toUpperCase()}</p>
                            </div>
                        </div>
                        <div class="grid">${gridHtml}</div>
                        <div style="margin-top: 20px; border-top: 3px solid #000; padding-top: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <span style="background: #000; color: #fff; padding: 3px 10px; margin-right: 15px; letter-spacing: 1px;">LEGENDA</span>
                                <span style="margin-right: 25px;">D: DOCENTE / DIRETTORE</span>
                                <span style="margin-right: 25px;">A: AULA / LOCATION / SET</span>
                                <span style="color: #666; font-size: 8px;">STATUS: PROGRAMMATA | IN CORSO | CONCLUSA</span>
                            </div>
                            <div style="text-align: right; font-size: 8px; color: #888;">
                                <span>© MFA FILMMAKING - STAMPATO IL ${new Date().toLocaleDateString('it-IT')}</span>
                            </div>
                        </div>
                        <div style="margin-top: 5px; font-size: 7px; font-weight: bold; text-transform: uppercase; color: #ccc; display: flex; justify-content: space-between;">
                            <span>PRODUZIONE MASTER - STRUMENTO DI PIANIFICAZIONE INTERNA</span>
                            <span>A4 LANDSCAPE OPTIMIZED V5.1</span>
                        </div>
                        <button class="no-print" onclick="window.print()" style="position:fixed; bottom:20px; right:20px; padding: 12px 24px; background: #000; color:#fff; border:none; font-weight:900; cursor:pointer; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">Stampa / Salva PDF</button>
                    </body>
                    </html>
                `);
                win.document.close();
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1600px] mx-auto">
                    <header className="mb-10 flex flex-col lg:flex-row justify-between items-start lg:items-end gap-6 border-b border-white/10 pb-8 text-left">
                        <div>
                            <h1 className="text-4xl md:text-6xl font-black italic tracking-tighter text-white uppercase leading-none">
                                MFA <span className="text-red-600">FILMMAKING</span>
                            </h1>
                            <p className="text-gray-500 text-[10px] font-black uppercase tracking-[0.5em] mt-3 italic">Controllo Produzione & Lezioni v5.0</p>
                        </div>
                        <div className="flex bg-white/5 p-1 rounded-sm border border-white/10">
                            <button onClick={() => setView('calendar')} className={`px-6 py-3 font-black text-[10px] uppercase tracking-widest transition-all flex items-center gap-2 ${view === 'calendar' ? 'bg-red-600 text-white shadow-lg' : 'text-gray-500 hover:text-white'}`}>
                                <i data-lucide="calendar"></i> Timeline
                            </button>
                            <button onClick={() => setView('admin')} className={`px-6 py-3 font-black text-[10px] uppercase tracking-widest transition-all flex items-center gap-2 ${view === 'admin' ? 'bg-white text-black shadow-lg' : 'text-gray-500 hover:text-white'}`}>
                                <i data-lucide="database"></i> DB
                            </button>
                            <button onClick={() => setShowCloudModal(true)} className={`px-4 py-3 font-black text-[10px] uppercase tracking-widest transition-all flex items-center gap-2 ${cloudConfig.active ? 'text-green-500' : 'text-gray-500 hover:text-white'}`}>
                                <i data-lucide="settings"></i>
                            </button>
                        </div>
                        <div className="mt-4 flex items-center gap-3">
                            <div className={`w-3 h-3 rounded-full ${cloudConfig.active ? (cloudStatus === 'success' ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : cloudStatus === 'syncing' ? 'bg-yellow-500 animate-pulse' : 'bg-red-500 shadow-[0_0_10px_#ef4444]') : 'bg-gray-600'}`}></div>
                            <div className="flex flex-col">
                                <span className="text-[9px] font-black uppercase tracking-widest text-gray-400 italic">
                                    {cloudConfig.active ? `Cloud: ${cloudStatus.toUpperCase()}` : 'Cloud: Disconnesso'}
                                </span>
                                {cloudStatus === 'error' && cloudErrorDetail && (
                                    <span className="text-[7px] text-red-500 font-bold uppercase mt-1">{cloudErrorDetail}</span>
                                )}
                            </div>
                        </div>
                    </header>

                    <div className="bg-white/5 p-6 border border-white/10 flex flex-col md:flex-row justify-between items-center gap-6 shadow-2xl mb-8">
                        <div className="flex items-center gap-6">
                            <button onClick={() => { const d = new Date(selectedWeek); d.setDate(d.getDate() - 7); setSelectedWeek(d) }} className="w-12 h-12 border border-white/20 hover:bg-red-600 transition-all flex items-center justify-center font-bold">←</button>
                            <div className="text-left">
                                <div className={labelPro + " !text-red-500"}>Periodo Attivo</div>
                                <input
                                    type="date"
                                    value={toLocalISO(selectedWeek)}
                                    onChange={(e) => setSelectedWeek(new Date(e.target.value))}
                                    className="bg-transparent text-2xl font-black text-white italic uppercase tracking-tighter border-none outline-none cursor-pointer"
                                />
                            </div>
                            <button onClick={() => { const d = new Date(selectedWeek); d.setDate(d.getDate() + 7); setSelectedWeek(d) }} className="w-12 h-12 border border-white/20 hover:bg-red-600 transition-all flex items-center justify-center font-bold">→</button>
                        </div>
                        <div className="flex-1 max-w-md">
                            <label className={labelPro + " !text-gray-400"}>Note di Produzione Settimanali</label>
                            <textarea
                                className="w-full bg-white/5 border border-white/10 p-2 text-[10px] text-gray-300 font-bold focus:border-red-600 outline-none"
                                placeholder="Note generali per questa settimana..."
                                value={weeklyNotes[currentWeekKey] || ''}
                                onChange={(e) => setWeeklyNotes({ ...weeklyNotes, [currentWeekKey]: e.target.value })}
                            ></textarea>
                        </div>
                        <button onClick={exportCallSheet} className={btnPrimary + " flex items-center gap-3"}>
                            <i data-lucide="file-text" className="!w-5 !h-5"></i> Esporta Planning (A4)
                        </button>
                    </div>

                    {view === 'calendar' ? (
                        <div className="space-y-8 text-left">

                            <div className="grid lg:grid-cols-3 gap-6">
                                {days.map((day, idx) => {
                                    const dateStr = currentMasterDays[idx];
                                    const dayLessons = getLessonsForDay(dateStr);
                                    return (
                                        <div
                                            key={day}
                                            className="bg-neutral-900/40 border border-white/5 min-h-[700px] flex flex-col shadow-2xl overflow-hidden"
                                            onDragOver={onDragOver}
                                            onDrop={(e) => onDrop(e, dateStr)}
                                        >
                                            <div className="p-6 bg-white/5 border-b border-white/5">
                                                <h3 className="text-2xl font-black uppercase text-white tracking-tighter italic">{day}</h3>
                                                <div className="text-3xl text-red-600 font-black tracking-tighter">{formatShortDate(dateStr)}</div>
                                            </div>

                                            <div className="p-4 space-y-4 overflow-y-auto">
                                                {dayLessons.length > 0 ? dayLessons.map(l => (
                                                    <div
                                                        key={l.id}
                                                        draggable
                                                        onDragStart={(e) => onDragStart(e, l.id)}
                                                        className={`bg-neutral-900 border border-white/10 p-5 shadow-xl transition-all relative cursor-move group ${l.status === 'ready' ? 'status-ready' : l.status === 'shooting' ? 'status-shooting' : 'status-wrapped'} ${checkConflict(l) ? 'ring-2 ring-red-600 ring-offset-2 ring-offset-black' : ''}`}
                                                    >
                                                        {checkConflict(l) && (
                                                            <div className="absolute -top-2 -right-2 bg-red-600 text-white p-1 text-[8px] font-black animate-bounce shadow-lg flex items-center gap-1">
                                                                <i data-lucide="alert-triangle" className="!w-3 !h-3"></i> CONFLITTO AULA
                                                            </div>
                                                        )}
                                                        <div className="flex justify-between items-start mb-3">
                                                            <div className="flex items-center gap-2">
                                                                <div className="text-xs font-black text-red-600 bg-red-600/10 px-2 py-1 tracking-tighter flex items-center gap-1">
                                                                    <i data-lucide="clock" className="!w-3 !h-3"></i> {l.startTime} — {l.endTime}
                                                                </div>
                                                                {l.status === 'shooting' && (
                                                                    <div className="w-2 h-2 bg-red-600 rounded-full animate-pulse-red"></div>
                                                                )}
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <button onClick={() => startEdit(l)} title="Modifica" className="p-1 text-gray-500 hover:text-white transition-colors">
                                                                    <i data-lucide="edit-3"></i>
                                                                </button>
                                                                <select
                                                                    value={l.status}
                                                                    onChange={(e) => updateStatus(l.id, e.target.value)}
                                                                    className="text-[9px] font-black uppercase bg-white/10 border-none text-gray-300 outline-none p-1 cursor-pointer"
                                                                >
                                                                    <option value="ready">Programmata</option>
                                                                    <option value="shooting">In Corso</option>
                                                                    <option value="wrapped">Conclusa</option>
                                                                </select>
                                                            </div>
                                                        </div>
                                                        <h4 className="text-xl font-black text-white uppercase italic leading-tight mb-2 tracking-tighter flex items-center gap-2">
                                                            <i data-lucide={l.status === 'shooting' ? 'clapperboard' : 'book-open'} className="text-red-600"></i>
                                                            {l.title}
                                                        </h4>
                                                        <div className="grid grid-cols-2 gap-y-2 border-t border-white/5 pt-3 mb-3">
                                                            <div className="flex items-center gap-2">
                                                                <i data-lucide="user" className="text-gray-500 !w-3 !h-3"></i>
                                                                <div><span className="text-[8px] text-gray-500 block uppercase font-bold">Docente</span><span className="text-[11px] text-white font-bold uppercase">{l.director}</span></div>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <i data-lucide="map-pin" className="text-gray-500 !w-3 !h-3"></i>
                                                                <div><span className="text-[8px] text-gray-500 block uppercase font-bold">Aula</span><span className="text-[11px] text-white font-bold uppercase italic">{l.room}</span></div>
                                                            </div>
                                                        </div>
                                                        {l.notes && (
                                                            <div className="bg-yellow-500/10 border-l-2 border-yellow-600 p-3 mt-2">
                                                                <p className="text-[10px] text-yellow-500 font-black uppercase mb-1">Note Tecniche:</p>
                                                                <p className="text-[11px] text-gray-300 italic">{l.notes}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )) : (
                                                    <div className="py-20 text-center opacity-20 border-2 border-dashed border-white/10">
                                                        <div className="text-[10px] font-black uppercase tracking-widest italic">Aula Libera</div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    ) : (
                        <div className="grid lg:grid-cols-12 gap-10 text-left">
                            <div className="lg:col-span-4">
                                <div className="bg-neutral-900 border border-white/10 p-8 shadow-2xl border-t-4 border-t-red-600">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-2xl font-black uppercase text-white italic tracking-tighter">{editingId ? 'Modifica Lezione' : 'Nuova Lezione'}</h2>
                                        {editingId && <button onClick={resetForm} className="text-[10px] font-black text-gray-500 hover:text-white uppercase transition-colors">Annulla</button>}
                                    </div>
                                    <form onSubmit={addLesson} className="space-y-4">
                                        <div>
                                            <label className={labelPro}>Materia / Titolo Attività</label>
                                            <input required placeholder="ES. DIREZIONE DELLA FOTOGRAFIA I" className={inputPro} value={formData.title} onChange={e => setFormData({ ...formData, title: e.target.value })} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className={labelPro}>Docente</label>
                                                <input required placeholder="NOME COGNOME" className={inputPro} value={formData.director} onChange={e => setFormData({ ...formData, director: e.target.value })} />
                                            </div>
                                            <div>
                                                <label className={labelPro}>Aula / Location</label>
                                                <input required placeholder="STUDIO / TEATRO" className={inputPro} value={formData.room} onChange={e => setFormData({ ...formData, room: e.target.value })} />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className={labelPro}>Inizio</label>
                                                <input required type="time" className={inputPro} value={formData.startTime} onChange={e => setFormData({ ...formData, startTime: e.target.value })} />
                                            </div>
                                            <div>
                                                <label className={labelPro}>Fine</label>
                                                <input required type="time" className={inputPro} value={formData.endTime} onChange={e => setFormData({ ...formData, endTime: e.target.value })} />
                                            </div>
                                        </div>
                                        <div>
                                            <label className={labelPro}>Data</label>
                                            <input required type="date" className={inputPro} value={formData.date} onChange={e => setFormData({ ...formData, date: e.target.value })} />
                                        </div>
                                        <div>
                                            <label className={labelPro}>Note Tecniche (Appariranno nell'export)</label>
                                            <textarea placeholder="Specifiche tecniche, materiali necessari..." className={inputPro + " min-h-[80px]"} value={formData.notes} onChange={e => setFormData({ ...formData, notes: e.target.value })}></textarea>
                                        </div>
                                        <button type="submit" className={btnPrimary + " w-full mt-4 !text-sm !py-5"}>{editingId ? 'AGGIORNA NEL PLANNING' : 'SALVA NEL PLANNING'}</button>
                                    </form>

                                    <div className="mt-10 pt-10 border-t border-white/5 space-y-4">
                                        <label className={labelPro}>Backup Tool</label>
                                        <div className="grid grid-cols-2 gap-4">
                                            <button onClick={exportDatabase} className={btnOutline}>Download JSON</button>
                                            <div className="relative">
                                                <input type="file" accept=".json" onChange={importDatabase} className="hidden" id="import-json" />
                                                <label htmlFor="import-json" className={btnOutline + " block text-center cursor-pointer"}>Carica JSON</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-8 text-left">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4">
                                    <div>
                                        <h2 className={labelPro + " !text-gray-500 !tracking-[0.5em] !mb-1"}>Log_Attivita_Master</h2>
                                        <span className="text-red-600 font-black text-xs italic tracking-tighter">{lessons.length} LEZIONI REGISTRATE</span>
                                    </div>
                                    <div className="flex gap-4 w-full md:w-auto">
                                        <input
                                            placeholder="Cerca materia, docente o aula..."
                                            className="bg-white/5 border border-white/10 px-4 py-2 text-xs text-white font-bold outline-none focus:border-red-600 transition-all flex-1 md:w-64"
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                        <button onClick={exportCallSheet} className={btnOutline + " flex items-center gap-2"}>
                                            <i data-lucide="file-text"></i> Esporta Database (PDF)
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-neutral-900 border border-white/5 shadow-2xl rounded-sm overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-white/5 text-[9px] text-gray-500 uppercase font-black tracking-widest border-b border-white/10">
                                            <tr>
                                                <th className="p-5">Data / Ora</th>
                                                <th className="p-5">Materia / Docente</th>
                                                <th className="p-5">Stato</th>
                                                <th className="p-5 text-right">Azione</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/5 font-bold">
                                            {[...lessons]
                                                .filter(l =>
                                                    l.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                                    l.director.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                                    l.room.toLowerCase().includes(searchTerm.toLowerCase())
                                                )
                                                .sort((a, b) => b.date.localeCompare(a.date) || a.startTime.localeCompare(b.startTime)).map(l => (
                                                    <tr key={l.id} className="hover:bg-white/[0.02] transition-colors group">
                                                        <td className="p-5">
                                                            <div className="text-xl text-white font-black tracking-tighter">{formatShortDate(l.date)}</div>
                                                            <div className="text-[10px] text-red-500 font-black">{l.startTime} - {l.endTime}</div>
                                                        </td>
                                                        <td className="p-5">
                                                            <div className="text-lg text-white uppercase italic tracking-tight mb-1">{l.title}</div>
                                                            <div className="text-[9px] text-gray-500 uppercase font-black">{l.director} • {l.room}</div>
                                                        </td>
                                                        <td className="p-5">
                                                            <span className={`text-[9px] uppercase font-black px-2 py-1 ${l.status === 'ready' ? 'bg-green-500/10 text-green-500' : l.status === 'shooting' ? 'bg-yellow-500/10 text-yellow-500' : 'bg-red-500/10 text-red-500'}`}>
                                                                {l.status === 'ready' ? 'OK' : l.status === 'shooting' ? 'LIVE' : 'OFF'}
                                                            </span>
                                                        </td>
                                                        <td className="p-5 text-right flex items-center justify-end gap-4 mt-4">
                                                            <button onClick={() => startEdit(l)} title="Modifica" className="text-gray-500 hover:text-white transition-colors">
                                                                <i data-lucide="edit-3"></i>
                                                            </button>
                                                            <button onClick={() => deleteLesson(l.id)} title="Elimina" className="text-gray-700 hover:text-red-600 transition-colors">
                                                                <i data-lucide="trash-2"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                        </tbody>
                                    </table>
                                </div>
                                {lessons.length === 0 && (
                                    <div className="mt-4 p-10 border border-dashed border-white/10 text-center text-gray-600 text-[10px] font-black uppercase tracking-widest">
                                        Nessun record trovato nel database
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 pt-8 border-t border-white/5 text-gray-700 text-[9px] uppercase tracking-[0.5em] font-black flex flex-col md:flex-row justify-between items-center gap-4 italic text-left">
                        <div className="flex items-center gap-3">
                            <div className="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
                            MFA Master Planning: Archivio Locale Attivo
                        </div>
                        <div className="text-gray-800 tracking-normal font-black uppercase">MFA_ENGINE_5.0_QUICK_EXPORT</div>
                    </footer>

                    {showCloudModal && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-neutral-900 border-2 border-white/10 p-8 max-w-md w-full shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black uppercase text-white italic tracking-tighter">⚙️ Impostazioni Cloud</h2>
                                    <button onClick={() => setShowCloudModal(false)} className="text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
                                </div>
                                <div className="space-y-5">
                                    <p className="text-[10px] text-gray-500 uppercase font-bold leading-relaxed">Configura JSONbin.io per sincronizzare i dati tra dispositivi.</p>
                                    <div>
                                        <label className={labelPro}>Bin ID</label>
                                        <input className={inputPro + " !text-sm !p-3"} value={cloudConfig.binId} onChange={e => setCloudConfig({ ...cloudConfig, binId: e.target.value })} placeholder="Es. 69e5..." />
                                    </div>
                                    <div>
                                        <label className={labelPro}>Master Key</label>
                                        <input type="password" className={inputPro + " !text-sm !p-3"} value={cloudConfig.apiKey} onChange={e => setCloudConfig({ ...cloudConfig, apiKey: e.target.value })} placeholder="La tua Master Key" />
                                    </div>
                                    <div className="flex items-center gap-3 bg-white/5 p-4 border border-white/5">
                                        <input type="checkbox" id="cloud-active" checked={cloudConfig.active} onChange={e => setCloudConfig({ ...cloudConfig, active: e.target.checked })} className="w-5 h-5 accent-red-600" />
                                        <label htmlFor="cloud-active" className="text-[10px] font-black uppercase text-white cursor-pointer select-none tracking-widest">Attiva Sincronizzazione Cloud</label>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={fetchFromCloud} className={btnOutline + " flex-1"}>Forza Ricezione</button>
                                        <button onClick={() => saveToCloud({ lessons, weeklyNotes })} className={btnOutline + " flex-1"}>Forza Invio</button>
                                    </div>
                                    {cloudStatus === 'error' && cloudErrorDetail && (
                                        <div className="bg-red-600/10 border border-red-600/20 p-3 flex items-start gap-2">
                                            <i data-lucide="alert-circle" className="text-red-600 !w-4 !h-4 mt-0.5"></i>
                                            <div>
                                                <p className="text-[9px] font-black text-red-600 uppercase tracking-widest mb-1">Errore Cloud</p>
                                                <p className="text-[11px] text-white font-bold">{cloudErrorDetail}</p>
                                            </div>
                                        </div>
                                    )}
                                    {cloudConfig.binId && cloudConfig.apiKey && (
                                        <div className="border-t border-white/10 pt-5">
                                            <h3 className="text-[10px] font-black uppercase text-red-500 mb-3 tracking-widest">📱 Sincronizza su Tablet / Cellulare</h3>
                                            <div className="flex flex-col items-center gap-3 bg-white p-4 rounded-lg mb-3">
                                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(generateMagicLink())}`} alt="QR" className="w-32 h-32" />
                                                <p className="text-[8px] text-black font-bold uppercase text-center">Inquadra per configurare su un altro dispositivo</p>
                                            </div>
                                            <button onClick={copyMagicLink} className={btnOutline + " w-full !text-[9px]"}>
                                                <i data-lucide="copy" className="inline-block mr-2 !w-3 !h-3"></i> Copia Magic Link
                                            </button>
                                        </div>
                                    )}
                                    <button onClick={() => setShowCloudModal(false)} className={btnPrimary + " w-full !py-4 !text-xs"}>Chiudi e Salva</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
